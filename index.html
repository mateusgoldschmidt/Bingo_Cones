<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cone Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010212;color:#fff;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
#wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;border:2px solid #0ff;box-shadow:0 0 24px #0ff8,0 0 60px #0ff2;border-radius:6px;max-width:100%;max-height:calc(100vh - 70px)}
#hud{width:100%;max-width:900px;display:flex;align-items:center;gap:14px;padding:6px 16px;background:rgba(0,0,0,.82);border-bottom:1px solid #0ff3;font-size:13px;white-space:nowrap;flex-wrap:wrap}
.hval{color:#0ff;text-shadow:0 0 6px #0ff}
.hval b{color:#fff}
.lives{display:flex;gap:4px;margin-left:auto}
.heart{font-size:17px}
#msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .25s;text-shadow:0 0 20px currentColor;text-align:center;line-height:1.4;z-index:10}
#startScreen,#gameOverScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#startScreen{background:radial-gradient(ellipse at center,#04103a 0%,#010210 70%)}
#startScreen h1{font-size:38px;color:#0ff;text-shadow:0 0 18px #0ff,0 0 45px #0ff4;letter-spacing:5px}
#startScreen h2{font-size:14px;color:#f0f;letter-spacing:3px;text-shadow:0 0 10px #f0f;margin-bottom:4px}
.tip{font-size:13px;color:#8cf;text-align:center;line-height:1.6}
.tip b{color:#0ff}
.tip .warn{color:#f88}
#startBtn,#restartBtn{margin-top:10px;padding:10px 30px;border-radius:8px;border:2px solid #0ff;background:linear-gradient(135deg,#001630,#003060);color:#0ff;font-size:16px;font-weight:bold;cursor:pointer;letter-spacing:3px;text-shadow:0 0 8px #0ff;box-shadow:0 0 16px #0ff5;font-family:'Courier New',monospace;transition:all .2s}
#startBtn:hover,#restartBtn:hover{background:linear-gradient(135deg,#003060,#005090);box-shadow:0 0 28px #0ff}
#gameOverScreen{background:rgba(0,0,0,.93);display:none;flex-direction:column;gap:12px}
#gameOverScreen h1{font-size:42px;color:#f44;text-shadow:0 0 22px #f44}
#gameOverScreen .fs{font-size:17px;color:#fff}
#gameOverScreen .fv{font-size:14px;color:#8cf;margin-top:4px}
</style>
</head>
<body>
<div id="wrap">
 <div id="hud">
  <div class="hval">raio (r): <b id="hR">12</b></div>
  <div class="hval">altura (h): <b id="hH">22</b></div>
  <div class="hval">geratriz (g): <b id="hG">25</b></div>
  <div class="hval">volume: <b id="hV">3318</b></div>
  <div class="hval">pontos: <b id="hS">0</b></div>
  <div class="lives" id="livesEl"></div>
 </div>
 <canvas id="cv"></canvas>
 <div id="msg"></div>
 <div id="startScreen">
  <h1>CONE RUNNER</h1>
  <h2>MISSAO DE ESTABILIDADE</h2>
  <div class="tip"><b>&larr; &rarr;</b> &nbsp; mudar de pista<br>Portais transformam o cone automaticamente<br>Passe pelos t&uacute;neis com o raio certo<br><span class="warn">Bloco vermelho = perder uma vida (&hearts;)</span></div>
  <button id="startBtn">INICIAR</button>
 </div>
 <div id="gameOverScreen">
  <h1>FIM DE JOGO</h1>
  <p class="fs">Pontuacao: <b id="goScore">0</b></p>
  <p class="fv" id="goStats"></p>
  <button id="restartBtn">JOGAR NOVAMENTE</button>
 </div>
</div>
<script>
// ===== CANVAS RESPONSIVO =====
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const HUD_H = 38;
function resizeCanvas(){
 const vw = window.innerWidth;
 const vh = window.innerHeight - HUD_H - 8;
 const ratio = 900/500;
 let cw = Math.min(vw - 4, 900);
 let ch = cw / ratio;
 if(ch > vh){ ch = vh; cw = ch * ratio; }
 cv.width  = Math.floor(cw);
 cv.height = Math.floor(ch);
}
resizeCanvas();
const W = ()=> cv.width;
const H = ()=> cv.height;
const LW= ()=> W()/3;

// DOM refs
const elR=document.getElementById('hR'),elH=document.getElementById('hH');
const elG=document.getElementById('hG'),elV=document.getElementById('hV');
const elS=document.getElementById('hS'),elLives=document.getElementById('livesEl');
const elMsg=document.getElementById('msg');
const elStart=document.getElementById('startScreen');
const elOver=document.getElementById('gameOverScreen');

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const hit2=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;

// ===== PARTÍCULAS =====
const PARTS=[];
function burst(x,y,col,n=22){
 for(let i=0;i<n;i++){
  const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
  PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,sz:2+Math.random()*4});
 }
}
function tickParts(dt){
 const f=dt/16.67;
 for(let i=PARTS.length-1;i>=0;i--){
  const p=PARTS[i];
  p.x+=p.vx*f;p.y+=p.vy*f;p.vy+=0.1*f;p.life-=0.025*f;
  if(p.life<=0)PARTS.splice(i,1);
 }
}
function drawParts(){
 PARTS.forEach(p=>{
  ctx.save();ctx.globalAlpha=p.life;
  ctx.shadowColor=p.col;ctx.shadowBlur=8;
  ctx.fillStyle=p.col;
  ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
  ctx.restore();
 });
}

// ===== TRILHA =====
const TRAIL=[];
function pushTrail(x,y){
 TRAIL.push({x,y,life:1});
 if(TRAIL.length>22)TRAIL.shift();
 for(const t of TRAIL) t.life=Math.max(0,t.life-0.045);
}
function drawTrail(){
 for(let i=1;i<TRAIL.length;i++){
  const t=TRAIL[i],p=TRAIL[i-1];
  ctx.save();ctx.globalAlpha=t.life*0.4;
  ctx.strokeStyle='#0ff';ctx.lineWidth=3*t.life;
  ctx.shadowColor='#0ff';ctx.shadowBlur=5;
  ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(t.x,t.y);ctx.stroke();
  ctx.restore();
 }
}

// ===== CONE PLAYER =====
class Cone{
 constructor(){
  this.lane=1;
  this.r=12;this.h=22;
  this.sc=2.6; // escala pixel
  this.px=LW()*1.5;
  this.targetX=this.px;
  this.invTimer=0;
 }
 get py(){return H()-52;} // sempre relativo ao canvas atual
 get g(){return Math.sqrt(this.r*this.r+this.h*this.h);}
 get vol(){return(Math.PI*this.r*this.r*this.h)/3;}
 get rPx(){return this.r*this.sc;}
 get hPx(){return this.h*this.sc;}
 hitbox(){return{x:this.px-this.rPx,y:this.py-this.hPx,w:this.rPx*2,h:this.hPx};}
 setLane(l){
  this.lane=clamp(l,0,2);
  this.targetX=LW()*(this.lane+0.5);
 }
 update(dt){
  const f=dt/16.67;
  this.px+=(this.targetX-this.px)*0.14*f;
  if(this.invTimer>0)this.invTimer-=dt;
 }
 draw(){
  const x=this.px,y=this.py;
  const rp=this.rPx,hp=this.hPx;
  pushTrail(x,y-hp*0.25);
  drawTrail();
  ctx.save();
  if(this.invTimer>0&&Math.floor(this.invTimer/80)%2===0){ctx.globalAlpha=0.25;}
  // sombra
  ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#0ff';
  ctx.beginPath();ctx.ellipse(x,y,rp,rp*0.28,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // corpo
  const gr=ctx.createLinearGradient(x,y-hp,x,y);
  gr.addColorStop(0,'#fff');gr.addColorStop(0.15,'#0ff');
  gr.addColorStop(0.65,'#09f');gr.addColorStop(1,'#002244');
  ctx.shadowColor='#0ff';ctx.shadowBlur=18;
  ctx.fillStyle=gr;
  ctx.beginPath();ctx.moveTo(x,y-hp);ctx.lineTo(x-rp,y);ctx.lineTo(x+rp,y);ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1;ctx.stroke();
  // geratriz tracejada
  ctx.save();ctx.setLineDash([5,4]);
  ctx.strokeStyle='rgba(0,255,255,0.5)';ctx.lineWidth=1.5;ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(x,y-hp);ctx.lineTo(x+rp,y);ctx.stroke();
  ctx.setLineDash([]);ctx.font='10px Courier New';
  ctx.fillStyle='rgba(0,255,255,0.75)';
  ctx.fillText('g',x+rp*0.52,y-hp*0.44);
  ctx.restore();
  // base
  ctx.beginPath();ctx.ellipse(x,y,rp,rp*0.3,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,200,255,0.3)';ctx.fill();
  ctx.strokeStyle='#0ff';ctx.lineWidth=1.5;ctx.shadowBlur=8;ctx.stroke();
  ctx.restore();
 }
}

// ===== CLASSE OBSTACLE =====
class Obstacle{
 constructor(lane,type,spd){
  this.lane=lane;this.type=type;this.spd=spd;
  this.cx=LW()*(lane+0.5);
  this.y=-210;
  this.w=LW()*0.76;this.h=170;
  this.done=false;
  if(type==='tunnel'){
   // abertura: 44 a 92px em passos de 12
   this.gap=44+Math.floor(Math.random()*5)*12;
  }
 }
 get x(){return this.cx-this.w/2;}
 update(dt){this.y+=this.spd*(dt/16.67);}
 isOff(){return this.y>H()+20;}

 apply(cone,gs){
  if(this.done)return;
  this.done=true;
  const cx=this.cx,cy=this.y+this.h*0.5;
  if(this.type==='portal_r_up'){
   cone.r=clamp(cone.r+3,4,28);
   showMsg('+raio  r='+cone.r.toFixed(0),'#0f8');
   burst(cx,cy,'#0f8');gs.score+=50;
  }else if(this.type==='portal_r_dn'){
   cone.r=clamp(cone.r-3,4,28);
   showMsg('-raio  r='+cone.r.toFixed(0),'#ff0');
   burst(cx,cy,'#ff0');gs.score+=50;
  }else if(this.type==='portal_h_up'){
   cone.h=clamp(cone.h+4,6,48);
   showMsg('+altura  h='+cone.h.toFixed(0),'#4af');
   burst(cx,cy,'#4af');gs.score+=50;
  }else if(this.type==='portal_h_dn'){
   cone.h=clamp(cone.h-4,6,48);
   showMsg('-altura  h='+cone.h.toFixed(0),'#fa4');
   burst(cx,cy,'#fa4');gs.score+=50;
  }else if(this.type==='tunnel'){
   if(cone.rPx<=this.gap/2+5){
    showMsg('PASSOU! +200','#0ff',1400);
    burst(cx,cy,'#0ff',36);gs.score+=200;
   }else{
    gs.loseLife(cone);
    const needed=Math.ceil(this.gap/2/cone.sc);
    showMsg('MUITO LARGO!\nr precisava ser <='+needed,'#f44',2000);
   }
  }
 }

 draw(){
  ctx.save();
  const cx=this.cx;
  if(this.type==='block'){
   // BLOCO VERMELHO
   const g2=ctx.createLinearGradient(this.x,this.y,this.x,this.y+this.h);
   g2.addColorStop(0,'rgba(230,30,30,0.92)');g2.addColorStop(1,'rgba(110,0,0,0.92)');
   ctx.shadowColor='#f44';ctx.shadowBlur=26;
   ctx.fillStyle=g2;
   ctx.beginPath();ctx.roundRect(this.x,this.y,this.w,this.h,8);ctx.fill();
   ctx.strokeStyle='#ff5555';ctx.lineWidth=2.5;ctx.stroke();
   ctx.font='bold 26px serif';ctx.textAlign='center';
   ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=8;
   ctx.fillText('\u2665',cx,this.y+this.h*0.46);
   ctx.font='bold 12px Courier New';ctx.fillStyle='#ffaaaa';ctx.shadowBlur=0;
   ctx.fillText('EVITE!',cx,this.y+this.h*0.72);
  }else if(this.type==='tunnel'){
   // TUNEL: duas paredes com abertura
   const gap=this.gap;
   const wallW=(this.w-gap)/2;
   const wg=ctx.createLinearGradient(this.x,0,this.x+wallW,0);
   wg.addColorStop(0,'rgba(0,50,110,0.96)');wg.addColorStop(1,'rgba(0,110,200,0.88)');
   ctx.shadowColor='#08f';ctx.shadowBlur=20;
   ctx.fillStyle=wg;
   // parede esq
   ctx.beginPath();ctx.roundRect(this.x,this.y,wallW,this.h,4);ctx.fill();
   ctx.strokeStyle='#0cf';ctx.lineWidth=2;ctx.stroke();
   // parede dir
   const rx=this.x+wallW+gap;
   ctx.beginPath();ctx.roundRect(rx,this.y,wallW,this.h,4);ctx.fill();ctx.stroke();
   // zona livre (levemente iluminada)
   ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#0ff';
   ctx.fillRect(this.x+wallW,this.y,gap,this.h);ctx.restore();
   // seta pra baixo no centro
   ctx.save();
   ctx.strokeStyle='rgba(0,255,255,0.65)';ctx.lineWidth=2;
   ctx.shadowColor='#0ff';ctx.shadowBlur=6;
   const ay=this.y+this.h*0.5;
   ctx.beginPath();ctx.moveTo(cx,ay-16);ctx.lineTo(cx,ay+16);ctx.stroke();
   ctx.beginPath();ctx.moveTo(cx-7,ay+7);ctx.lineTo(cx,ay+16);ctx.lineTo(cx+7,ay+7);ctx.stroke();
   ctx.restore();
   // label
   ctx.font='bold 11px Courier New';ctx.textAlign='center';
   ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=5;
   const neededR=(this.gap/2/2.6).toFixed(0);
   ctx.fillText('r <= '+neededR,cx,this.y+14);
   ctx.fillText('TUNEL',cx,this.y+this.h-8);
  }else{
   // PORTAL
   const COLS={portal_r_up:'#0f8',portal_r_dn:'#ff0',portal_h_up:'#4af',portal_h_dn:'#fa4'};
   const LBLS={portal_r_up:'+r  +raio',portal_r_dn:'-r  -raio',portal_h_up:'+h  +altura',portal_h_dn:'-h  -altura'};
   const SUBS={portal_r_up:'raio cresce',portal_r_dn:'raio diminui',portal_h_up:'cone fica mais alto',portal_h_dn:'cone fica mais baixo'};
   const col=COLS[this.type]||'#fff';
   ctx.shadowColor=col;ctx.shadowBlur=22;
   ctx.strokeStyle=col;ctx.lineWidth=2.5;
   const pg=ctx.createLinearGradient(this.x,this.y,this.x,this.y+this.h);
   pg.addColorStop(0,'rgba(0,0,0,0)');
   pg.addColorStop(0.45,col+'22');
   pg.addColorStop(1,'rgba(0,0,0,0)');
   ctx.fillStyle=pg;
   ctx.beginPath();ctx.roundRect(this.x,this.y,this.w,this.h,8);ctx.fill();ctx.stroke();
   // mini cones antes/depois
   this._miniCones(col);
   // label
   ctx.font='bold 19px Courier New';ctx.textAlign='center';
   ctx.fillStyle=col;ctx.shadowBlur=10;
   ctx.fillText(LBLS[this.type]||'',cx,this.y+this.h*0.62);
   ctx.font='10px Courier New';ctx.fillStyle=col+'99';ctx.shadowBlur=0;
   ctx.fillText(SUBS[this.type]||'',cx,this.y+this.h*0.78);
  }
  ctx.restore();
 }

 _miniCones(col){
  ctx.save();
  const y0=this.y+this.h*0.28;
  const cx=this.cx;
  // cone antes (cinza)
  ctx.globalAlpha=0.45;ctx.fillStyle='#888';
  ctx.beginPath();ctx.moveTo(cx-26,y0-12);ctx.lineTo(cx-34,y0);ctx.lineTo(cx-18,y0);ctx.closePath();ctx.fill();
  // seta
  ctx.font='13px serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.globalAlpha=0.85;
  ctx.fillText('\u2192',cx,y0-4);
  // cone depois
  let r2=8,h2=12;
  if(this.type==='portal_r_up')r2=14;
  else if(this.type==='portal_r_dn')r2=4;
  else if(this.type==='portal_h_up')h2=20;
  else if(this.type==='portal_h_dn')h2=5;
  ctx.globalAlpha=0.78;ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(cx+26,y0-h2);ctx.lineTo(cx+26-r2,y0);ctx.lineTo(cx+26+r2,y0);ctx.closePath();ctx.fill();
  ctx.restore();
 }
}

// ===== GAME STATE =====
const GS={
 cone:null,obs:[],lives:3,score:0,
 running:false,lastTime:0,bgOff:0,
 spawnTimer:0,spawnEvery:1500,speed:3.6,
 loseLife(cone){
  this.lives=Math.max(0,this.lives-1);
  cone.invTimer=2400;
  burst(cone.px,cone.py-cone.hPx*0.5,'#f44',30);
  renderLives();
  if(this.lives<=0)this.over();
  else showMsg('-1 VIDA!','#f44',900);
 },
 over(){
  this.running=false;
  document.getElementById('goScore').textContent=Math.floor(this.score);
  document.getElementById('goStats').textContent=
   'r='+this.cone.r.toFixed(1)+' | h='+this.cone.h.toFixed(1)+
   ' | g='+this.cone.g.toFixed(1)+' | V='+Math.round(this.cone.vol);
  elOver.style.display='flex';
 },
 reset(){
  resizeCanvas();
  this.cone=new Cone();
  this.obs=[];this.lives=3;this.score=0;
  this.running=true;this.lastTime=0;
  this.bgOff=0;this.spawnTimer=0;
  this.spawnEvery=1500;this.speed=3.6;
  PARTS.length=0;TRAIL.length=0;
  renderLives();
 }
};

// ===== LIVES HUD =====
function renderLives(){
 elLives.innerHTML='';
 for(let i=0;i<3;i++){
  const s=document.createElement('span');
  s.className='heart';
  s.textContent=i<GS.lives?'\u2665':'\u2661';
  s.style.color=i<GS.lives?'#f44':'#333';
  elLives.appendChild(s);
 }
}

// ===== MSG =====
let _mt=null;
function showMsg(txt,col,dur=1300){
 elMsg.innerHTML=txt.replace('\n','<br>');
 elMsg.style.color=col;
 elMsg.style.opacity='1';
 clearTimeout(_mt);
 _mt=setTimeout(()=>{elMsg.style.opacity='0';},dur);
}

// ===== SPAWN =====
const TYPES=['portal_r_up','portal_r_dn','portal_h_up','portal_h_dn','tunnel','block'];
const WGTS =[        15,          15,          15,          15,       30,      10];
function pickType(){
 const tot=WGTS.reduce((a,b)=>a+b,0);
 let rnd=Math.random()*tot;
 for(let i=0;i<TYPES.length;i++){rnd-=WGTS[i];if(rnd<=0)return TYPES[i];}
 return 'tunnel';
}
function spawnObs(){
 const busy=GS.obs.filter(o=>o.y>-100&&o.y<H()*0.65).map(o=>o.lane);
 let lane,tries=0;
 do{lane=Math.floor(Math.random()*3);tries++;}while(busy.includes(lane)&&tries<9);
 GS.obs.push(new Obstacle(lane,pickType(),GS.speed));
}

// ===== BG =====
function drawBG(){
 ctx.clearRect(0,0,W(),H());
 const bg=ctx.createLinearGradient(0,0,0,H());
 bg.addColorStop(0,'#010215');bg.addColorStop(0.55,'#020522');bg.addColorStop(1,'#010115');
 ctx.fillStyle=bg;ctx.fillRect(0,0,W(),H());
 ctx.save();
 // divisores
 ctx.strokeStyle='rgba(0,255,255,0.08)';ctx.lineWidth=1;
 for(let i=1;i<3;i++){
  ctx.beginPath();ctx.moveTo(i*LW(),0);ctx.lineTo(i*LW(),H());ctx.stroke();
 }
 // linhas de velocidade
 ctx.strokeStyle='rgba(0,120,255,0.1)';ctx.lineWidth=1;
 const step=52;
 for(let y=(GS.bgOff%step)-step;y<H()+step;y+=step){
  ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y+5);ctx.stroke();
 }
 // estrelas
 ctx.fillStyle='rgba(190,210,255,0.42)';
 for(let i=0;i<75;i++){
  ctx.fillRect(((i*163+GS.bgOff*0.22)%W()),((i*97+GS.bgOff*0.07)%H()),1.2,1.2);
 }
 ctx.restore();
 // linha do chao
 ctx.save();
 ctx.strokeStyle='rgba(0,255,255,0.32)';ctx.lineWidth=2;
 ctx.shadowColor='#0ff';ctx.shadowBlur=8;
 ctx.beginPath();ctx.moveTo(0,H()-36);ctx.lineTo(W(),H()-36);ctx.stroke();
 ctx.restore();
}

// ===== HUD =====
function hudUpdate(){
 const c=GS.cone;
 elR.textContent=c.r.toFixed(1);elH.textContent=c.h.toFixed(1);
 elG.textContent=c.g.toFixed(1);elV.textContent=Math.round(c.vol);
 elS.textContent=Math.floor(GS.score);
}

// ===== INPUT =====
window.addEventListener('keydown',e=>{
 if(!GS.running)return;
 if(e.code==='ArrowLeft'||e.code==='KeyA'||e.code==='KeyQ'){
  GS.cone.setLane(GS.cone.lane-1);e.preventDefault();
 }
 if(e.code==='ArrowRight'||e.code==='KeyD'){
  GS.cone.setLane(GS.cone.lane+1);e.preventDefault();
 }
 if(e.code==='Space')e.preventDefault();
});

// swipe mobile
let tx=null;
cv.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchend',e=>{
 if(tx===null||!GS.running)return;
 const dx=e.changedTouches[0].clientX-tx;
 if(dx<-28)GS.cone.setLane(GS.cone.lane-1);
 else if(dx>28)GS.cone.setLane(GS.cone.lane+1);
 tx=null;
},{passive:true});

// ===== LOOP =====
function update(dt){
 const gs=GS,cone=gs.cone,f=dt/16.67;
 gs.bgOff+=gs.speed*f*2;
 gs.speed=3.6+gs.score/9000;
 gs.spawnEvery=Math.max(880,1500-gs.score/14);
 gs.score+=gs.speed*f*0.85;
 gs.spawnTimer+=dt;
 if(gs.spawnTimer>=gs.spawnEvery){spawnObs();gs.spawnTimer=0;}
 for(let i=gs.obs.length-1;i>=0;i--){
  const o=gs.obs[i];
  o.spd=gs.speed;o.update(dt);
  if(o.isOff()){gs.obs.splice(i,1);continue;}
  const ch=cone.hitbox();
  if(o.type==='block'){
   if(cone.invTimer<=0&&hit2(ch,{x:o.x,y:o.y,w:o.w,h:o.h})){
    gs.loseLife(cone);gs.obs.splice(i,1);
   }
  }else if(o.type==='tunnel'){
   if(!o.done&&cone.py>=o.y+o.h*0.52&&cone.py<=o.y+o.h*0.88){
    if(Math.abs(cone.px-o.cx)<o.w*0.44)o.apply(cone,gs);
   }
  }else{
   if(!o.done&&hit2(ch,{x:o.x+o.w*0.08,y:o.y+o.h*0.28,w:o.w*0.84,h:o.h*0.44})){
    o.apply(cone,gs);
   }
  }
 }
 cone.update(dt);
 hudUpdate();
 tickParts(dt);
}

function render(){
 drawBG();
 GS.obs.forEach(o=>o.draw());
 drawParts();
 GS.cone.draw();
}

function loop(ts){
 if(!GS.running)return;
 if(!GS.lastTime)GS.lastTime=ts;
 const dt=Math.min(ts-GS.lastTime,50);
 GS.lastTime=ts;
 update(dt);render();
 requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click',()=>{
 elStart.style.display='none';
 GS.reset();
 requestAnimationFrame(loop);
});
document.getElementById('restartBtn').addEventListener('click',()=>{
 elOver.style.display='none';
 GS.reset();
 requestAnimationFrame(loop);
});
window.addEventListener('resize',()=>{
 if(GS.running){
  resizeCanvas();
  GS.cone.px=LW()*(GS.cone.lane+0.5);
  GS.cone.targetX=GS.cone.px;
  GS.obs.forEach(o=>{o.cx=LW()*(o.lane+0.5);o.w=LW()*0.76;});
 }
});
</script>
</body>
</html>
